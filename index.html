<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sudoeste Meu Amor</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
}

header{
background:#0c7a3c;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
max-width:1100px;
margin:auto;
}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;

}

.card{

background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);

}

button{

background:#0c7a3c;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;

}

button:hover{
background:#095e2d;
}

.rating span{

cursor:pointer;
font-size:20px;
color:orange;

}

</style>

</head>

<body>

<header>

<h1>❤️ Sudoeste Meu Amor</h1>
<p>Descubra empresas do bairro</p>

</header>

<div class="container">

<h2>Empresas do Sudoeste</h2>

<div id="empresas" class="grid"></div>

</div>

<script>

const empresas=[

{
nome:"Bar do Sudoeste",
descricao:"Bar tradicional do bairro",
desconto:10,
avaliacoes:[5,4,4]
},

{
nome:"Café Octogonal",
descricao:"Café especial e brunch",
desconto:15,
avaliacoes:[5,5,4,5]
},

{
nome:"Salão Bella Hair",
descricao:"Especialista em coloração",
desconto:20,
avaliacoes:[4,4,5]
}

]

function media(av){

return (
av.reduce((a,b)=>a+b,0)/av.length
).toFixed(1)

}

function gerarCupom(desc){

let codigo="SUDO"+Math.floor(Math.random()*10000)

alert(
`Cupom gerado!

Código: ${codigo}

Desconto: ${desc}%`
)

}

function avaliar(index,nota){

empresas[index].avaliacoes.push(nota)

render()

}

function render(){

const div=document.getElementById("empresas")

div.innerHTML=""

empresas.forEach((e,i)=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<h3>${e.nome}</h3>

<p>${e.descricao}</p>

<p><b>Desconto:</b> ${e.desconto}%</p>

<p><b>Avaliação:</b> ⭐ ${media(e.avaliacoes)}</p>

<button onclick="gerarCupom(${e.desconto})">
Pegar Cupom
</button>

<div class="rating">

<span onclick="avaliar(${i},1)">⭐</span>
<span onclick="avaliar(${i},2)">⭐</span>
<span onclick="avaliar(${i},3)">⭐</span>
<span onclick="avaliar(${i},4)">⭐</span>
<span onclick="avaliar(${i},5)">⭐</span>

</div>

`

div.appendChild(card)

})

}

render()

</script>

</body>
</html>
