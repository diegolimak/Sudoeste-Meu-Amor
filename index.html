<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sudoeste Meu Amor</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<header>

<h1>❤️ Sudoeste Meu Amor</h1>
<p>Descubra empresas do bairro</p>

</header>

<section class="cadastro">

<h2>Cadastrar empresa</h2>

<input id="nome" placeholder="Nome da empresa">

<input id="endereco" placeholder="Endereço">

<input id="desconto" placeholder="Desconto (%)">

<textarea id="descricao" placeholder="Descrição"></textarea>

<button onclick="cadastrarEmpresa()">Cadastrar</button>

</section>

<section>

<h2>Empresas</h2>

<div id="empresas"></div>

</section>

<section>

<h2>Mapa do bairro</h2>

<div id="map"></div>

</section>

<script src="app.js"></script>

</body>

</html>
